name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-node-bindings:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/build.yaml
    secrets: inherit

  build-gui:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: puniyu/setup-rust@main
        with:
          target: x86_64-pc-windows-msvc
          cache: false
        
      - name: Build GUI
        run: cargo build --release --bin dwt_watermark --features gui
        
      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-exe
          path: target/release/dwt_watermark.exe

  publish:
    needs: [release-please, build-node-bindings, build-gui]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download JS bindings
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: .
          
      - name: Download Node bindings
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: watermark*

      - name: Setup Nodejs
        uses: puniyu/setup-node@main
        with:
          node-version: lts/*
          pnpm-version: latest
          cache: false
          
      - name: Setup NPM Dirs
        run: |
          pnpm i -g @napi-rs/cli
          pnpm config set provenance true
          pnpm config set registry https://registry.npmjs.org/
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
          napi create-npm-dirs
          napi artifacts
          pnpm publish --access public --no-git-checks --ignore-scripts
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Sync to Taobao Mirror
        run: |
          curl -X PUT "https://registry-direct.npmmirror.com/-/package/@ikenxuan/watermark/syncs"
          curl -X PUT "https://registry-direct.npmmirror.com/-/package/@ikenxuan/watermark-win32-x64-msvc/syncs"
          curl -X PUT "https://registry-direct.npmmirror.com/-/package/@ikenxuan/watermark-darwin-arm64/syncs"
          curl -X PUT "https://registry-direct.npmmirror.com/-/package/@ikenxuan/watermark-linux-x64-gnu/syncs"
          curl -X PUT "https://registry-direct.npmmirror.com/-/package/@ikenxuan/watermark-linux-arm64-gnu/syncs"

      - name: Download GUI artifact
        uses: actions/download-artifact@v4
        with:
          name: gui-exe
          path: gui
          
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            gui/dwt_watermark.exe
          fail_on_unmatched_files: true
