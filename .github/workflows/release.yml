name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-node-bindings:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/build.yaml
    secrets: inherit

  build-tauri:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Ensure x86_64 target installed
        if: contains(matrix.args, 'x86_64-apple-darwin')
        run: rustup target add x86_64-apple-darwin

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri
        run: pnpm tauri build ${{ matrix.args }}

      - name: Compute artifact name
        id: artifact-name
        shell: bash
        run: |
          if [ -n "${{ matrix.args }}" ]; then
            target="${{ matrix.args }}"
            target="${target#--target }"
            echo "name=tauri-${{ matrix.platform }}-${target}" >> "$GITHUB_OUTPUT"
          else
            echo "name=tauri-${{ matrix.platform }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Tauri artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb

  publish:
    needs: [release-please, build-node-bindings, build-tauri]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download JS bindings
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: .

      - name: Download Node bindings
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: watermark*

      - name: Download Tauri artifacts
        uses: actions/download-artifact@v4
        with:
          path: tauri-artifacts
          pattern: tauri-*

      - name: Setup Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup NPM Dirs
        run: |
          pnpm i -g @napi-rs/cli
          pnpm config set provenance true
          pnpm config set registry https://registry.npmjs.org/
          napi create-npm-dirs
          napi artifacts
          pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Sync to Taobao Mirror
        run: |
          curl -X PUT "https://registry-direct.npmmirror.com/-/package/@ikenxuan/watermark/syncs"
          curl -X PUT "https://registry-direct.npmmirror.com/-/package/@ikenxuan/watermark-win32-x64-msvc/syncs"
          curl -X PUT "https://registry-direct.npmmirror.com/-/package/@ikenxuan/watermark-darwin-arm64/syncs"
          curl -X PUT "https://registry-direct.npmmirror.com/-/package/@ikenxuan/watermark-linux-x64-gnu/syncs"
          curl -X PUT "https://registry-direct.npmmirror.com/-/package/@ikenxuan/watermark-linux-arm64-gnu/syncs"

      - name: Upload Tauri to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            tauri-artifacts/**/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
